version: '3.8'

services:
  kisan-db:
    image: postgres:15-alpine
    container_name: kisan-db
    ports:
      - "5437:5432"
    environment:
      POSTGRES_DB: kisan_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
    volumes:
      - kisan_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d kisan_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  kisan-backend:
    build: ./backend
    container_name: kisan-backend
    ports:
      - "8087:8087"
    environment:
      - DB_HOST=kisan-db
      - DB_PORT=5432
      - DB_NAME=kisan_db
      - DB_USERNAME=postgres
      - DB_PASSWORD=root
      - JWT_SECRET=kisan-agritech-supply-chain-transparency-secret-key-signature
      - CORS_ORIGINS=http://localhost:5173
    depends_on:
      kisan-db:
        condition: service_healthy

  kisan-frontend:
    build: ./frontend
    container_name: kisan-frontend
    ports:
      - "5177:80"
    depends_on:
      - kisan-backend

volumes:
  kisan_pgdata:

